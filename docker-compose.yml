services:
  aswg:
    container_name: aswg
    image: aquerr/arma-server-web-gui
    restart: on-failure:3
    user: "1001:1001"
    ports:
      - "8085:8085/tcp"
      - "2302-2306:2302-2306/udp"
    volumes:
      - arma-server:/aswg/arma-server
      - ./aswg_docker/data:/aswg/data
      - ./aswg_docker/config:/aswg/config
      - ./aswg_docker/arma_profiles:/home/aswg/.local/share/Arma 3 - Other Profiles
volumes:
  arma-server: