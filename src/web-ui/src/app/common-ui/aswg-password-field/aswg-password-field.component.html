<mat-form-field
  [matTooltip]="tooltip()"
  [matTooltipPosition]="tooltipPositionComputed()"
>
  <mat-label>{{ labelText() }}</mat-label>
  <input [formControl]="control" matInput [type]="hide() ? 'password' : 'text'" />
  <button mat-icon-button matSuffix (click)="toggleVisibility($event)"
          [attr.aria-label]="'Toggle visibility'"
          [attr.aria-pressed]="hide()">
    <mat-icon [fontIcon]="hide() ? 'visibility_off' : 'visibility_on'"></mat-icon>
  </button>
  @if (control.hasError('required')) {
    <mat-error>This field is required</mat-error>
  }
</mat-form-field>
