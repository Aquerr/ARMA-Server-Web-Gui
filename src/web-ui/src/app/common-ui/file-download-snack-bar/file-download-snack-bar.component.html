<div class="download-snackbar">
  <div class="snackbar-header">
    <span class="snackbar-title">Downloading</span>
    <button class="snackbar-close" (click)="snackBarRef.dismissWithAction()" matTooltip="Close" aria-label="Close">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  @for (file of getDownloadingFiles(); track file.fileName; let i = $index) {
    <div class="file-row">
      <div class="file-meta">
        <div class="file-info">
          <div class="file-name" [title]="file.fileName">{{ file.fileName }}</div>
          <div class="file-size">{{ file.downloadedSize | filesize }} / {{ file.totalSize | filesize }}</div>
        </div>
        <button class="cancel-btn" (click)="cancelDownload(file)" matTooltip="Cancel" aria-label="Cancel download">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      <mat-progress-bar mode="determinate"
                        [value]="file.progress"
                        [bufferValue]="file.totalSize"
      />
      <div class="progress-label">{{ file.progress }}%</div>
    </div>
  }
</div>
