<div class="container">
  <h1>Server Status</h1>
  <div>
    Status: <span
    [ngStyle]="isServerOffline() ? { color: 'red' } : { color: 'green' }">{{ serverStatus().statusText }}</span>
  </div>
  @if (canToggleServer()) {
    <div class="server-toggle-wrapper">
        @if (isServerOffline()) {
          <div class="server-toggle">
            <div class="server-toggle-update-checkbox">
              <mat-checkbox id="perform-update-checkbox" [(ngModel)]="performUpdate"></mat-checkbox>
              <span class="server-toggle-update-checkbox-text">Perform Arma update during start?</span>
            </div>
            <button mat-flat-button color="primary" (click)="toggleServer()">{{ "START" }}</button>
          </div>
        } @else {
          <div>
            <button mat-flat-button color="primary" (click)="toggleServer()">{{ "STOP" }}</button>
          </div>
        }
    </div>
  }
  <app-server-console></app-server-console>
  <app-player-list [playerList]="playerList()"></app-player-list>
</div>
