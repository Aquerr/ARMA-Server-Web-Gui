# General
spring.application.name=ASWG
server.port=8085

# Security
aswg.security.enabled=true
aswg.security.jwt.issuer=${spring.application.name}
aswg.security.jwt.expiration-time=PT2H
aswg.security.cors.allowed-origins=http://localhost:4200,http://localhost:8085

# Database
spring.h2.console.enabled=true
spring.jpa.show-sql=true

# Aswg
aswg.server-directory-path=./server